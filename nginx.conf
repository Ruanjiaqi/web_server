server {
    listen 80;
    server_name _;
    index index.php index.html;
    root /var/www/public;
    client_max_body_size 100M;

    # ── ThinkPHP URL 伪静态 ───────────────────────────────
    location / {
        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.php?s=$1 last;
            break;
        }
    }

    # ── 静态资源缓存 ──────────────────────────────────────
    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf|ico|woff|woff2|ttf|eot|svg)$ {
        expires      30d;
        error_log    off;
        access_log   /dev/null;
    }

    location ~ .*\.(js|css)$ {
        expires      12h;
        error_log    off;
        access_log   /dev/null;
    }

    # ── Workerman WebSocket 代理 ──────────────────────────
    # /notice → Workerman chat 长连接（客服/通知）
    location /notice {
        proxy_pass         http://127.0.0.1:40001/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_read_timeout 3600s;
    }

    # /msg → Workerman admin 长连接（后台推送）
    location /msg {
        proxy_pass         http://127.0.0.1:40002/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ── PHP-FPM ───────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO        $fastcgi_path_info;
        fastcgi_read_timeout 300;

        # 透传微信云托管注入的身份请求头
        fastcgi_param  HTTP_X_WX_OPENID   $http_x_wx_openid;
        fastcgi_param  HTTP_X_WX_SOURCE   $http_x_wx_source;
        fastcgi_param  HTTP_X_WX_UNIONID  $http_x_wx_unionid;
    }

    # ── 禁止访问隐藏文件 ──────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
